{% extends "base.html" %}

{% block title %}Forgot Password - Rafflr{% endblock %}

{% block head %}
<style>
    .auth-card {
        animation: fadeInUp 0.5s ease-out;
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="auth-card max-w-md w-full">
        <!-- Card -->
        <div class="bg-dark-800 border border-slate-700/50 rounded-2xl p-8 shadow-dark-lg">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center shadow-glow mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-white tracking-tight">Reset your password</h2>
                <p class="mt-2 text-slate-400">
                    Enter your email and we'll send you a reset link
                </p>
            </div>

            <form action="/auth/forgot-password" method="POST" class="space-y-5">
                {{ csrf_input(request) }}

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email address</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                           class="w-full px-4 py-3 bg-dark-700 border border-slate-600/50 text-slate-100 placeholder-slate-500 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                           placeholder="you@example.com">
                </div>

                <button type="submit"
                        class="btn-press btn-primary w-full flex justify-center items-center py-3 px-4 bg-gradient-to-r from-primary to-primary-dark text-white rounded-xl font-semibold shadow-glow hover:shadow-glow-lg transition-all">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    Send reset link
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/auth/login" class="inline-flex items-center text-primary hover:text-primary-light font-medium transition-colors group">
                    <svg class="w-4 h-4 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Back to login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
